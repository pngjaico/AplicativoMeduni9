    // Flashcards Screen
    const FlashcardsScreen = ({ flashcards, materias, selectedMateria, onSelectMateria, userSemester }) => {
      const [currentIndex, setCurrentIndex] = useState(0);
      const [isFlipped, setIsFlipped] = useState(false);
      const [sessionComplete, setSessionComplete] = useState(false);
      const [sessionStats, setSessionStats] = useState({ correct: 0, total: 0, skipped: 0 });
      const [semesterFilter, setSemesterFilter] = useState(userSemester || null);
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedTema, setSelectedTema] = useState(null); // assunto/aula dentro da materia
      const [studyMode, setStudyMode] = useState(null); // null = choosing, 'sm2', 'random', 'sequential'
      const srData = JSON.parse(localStorage.getItem('meduni9_sr_data') || '{}');

      // Only non-quiz flashcards
      const pureFlashcards = flashcards.filter(f => f.tipo !== 'quiz');

      const filteredByMateria = pureFlashcards.filter(
        f => !selectedMateria || f.materia === selectedMateria
      );

      // Filter also by tema/assunto if selected ('__todos__' = all cards from materia)
      const filtered = (!selectedTema || selectedTema === '__todos__')
        ? filteredByMateria
        : filteredByMateria.filter(f => f.tema === selectedTema);

      // Build deck based on study mode
      const buildDeck = () => {
        if (studyMode === 'random') {
          return [...filtered].sort(() => Math.random() - 0.5);
        } else if (studyMode === 'sequential') {
          return [...filtered];
        } else {
          return SM2.getDueCards(filtered, srData);
        }
      };

      const deck = useMemo(() => {
        if (!selectedMateria || !studyMode) return [];
        return buildDeck();
      }, [selectedMateria, studyMode, filtered.length]);

      const currentCard = deck[currentIndex];

      const handleRate = (quality) => {
        const card = currentCard;
        if (studyMode === 'sm2') {
          const currentData = srData[card.id] || { reps: 0, ef: 2.5, interval: 0, nextReview: Date.now() };
          const result = SM2.calculateNextReview(quality, currentData.reps, currentData.ef, currentData.interval);
          srData[card.id] = { ...result };
          localStorage.setItem('meduni9_sr_data', JSON.stringify(srData));
        }

        if (currentIndex < deck.length - 1) {
          setCurrentIndex(currentIndex + 1);
          setIsFlipped(false);
        } else {
          setSessionComplete(true);
          setSessionStats({
            correct: sessionStats.correct + (quality >= 4 ? 1 : 0),
            total: deck.length,
            skipped: 0
          });
        }
      };

      const resetSession = () => {
        setCurrentIndex(0);
        setIsFlipped(false);
        setSessionComplete(false);
        setSessionStats({ correct: 0, total: 0, skipped: 0 });
        setStudyMode(null);
        setSelectedTema(null);
      };

      // If no materia selected, show selection screen
      if (!selectedMateria) {
        const materiasWithCards = materias.filter(m => {
          const count = pureFlashcards.filter(f => f.materia === m.id).length;
          return count > 0;
        });

        const semFiltered = semesterFilter
          ? materiasWithCards.filter(m => m.semestre === semesterFilter)
          : materiasWithCards;

        const filteredMaterias = semFiltered.filter(m =>
          fuzzyMatch(searchQuery, m.nome) || fuzzyMatch(searchQuery, m.sigla || '')
        );

        const semesters = [...new Set(materiasWithCards.map(m => m.semestre))].sort((a,b) => a-b);

        return (
          <>
            <div className="screen-content">
              <h2 className="section-title">Flashcards</h2>

              {semesters.length > 1 && (
                <div className="semester-tabs">
                  <button
                    className={`semester-tab ${!semesterFilter ? 'active' : ''}`}
                    onClick={() => setSemesterFilter(null)}
                  >Todos</button>
                  {semesters.map(s => (
                    <button
                      key={s}
                      className={`semester-tab ${semesterFilter === s ? 'active' : ''}`}
                      onClick={() => setSemesterFilter(s)}
                    >{s}º sem</button>
                  ))}
                </div>
              )}

              <div className="subject-search-wrap">
                <span className="subject-search-icon">🔍</span>
                <input
                  type="search"
                  className="subject-search"
                  placeholder="Buscar matéria..."
                  value={searchQuery}
                  onChange={e => setSearchQuery(e.target.value)}
                />
              </div>

              <div className="subject-select-list">
                {filteredMaterias.length === 0 && (
                  <div style={{ textAlign: 'center', padding: '40px 0', color: 'var(--text-secondary)' }}>
                    <p>Nenhum resultado encontrado.</p>
                  </div>
                )}
                {filteredMaterias.map(m => {
                  const count = pureFlashcards.filter(f => f.materia === m.id).length;
                  const dueCount = SM2.getDueCards(pureFlashcards.filter(f => f.materia === m.id), srData).length;
                  return (
                    <div key={m.id} className="subject-select-card" onClick={() => { onSelectMateria(m.id); setStudyMode(null); }}>
                      <div className="subject-select-icon" style={{ background: `${m.cor || 'var(--primary)'}20` }}>
                        {m.icon}
                      </div>
                      <div className="subject-select-info">
                        <div className="subject-select-name">{m.sigla || m.nome}</div>
                        <div className="subject-select-meta">
                          {count} cards{dueCount > 0 ? ` — ${dueCount} para revisar` : ' — em dia'}
                        </div>
                      </div>
                      <div style={{ color: 'var(--text-secondary)' }}><IconChevronRight /></div>
                    </div>
                  );
                })}
              </div>
            </div>
          </>
        );
      }

      const selectedMateriaObj = materias.find(m => m.id === selectedMateria);
      const backLabel = selectedMateriaObj ? (selectedMateriaObj.sigla || selectedMateriaObj.nome) : 'Flashcards';

      // Tema/assunto selection screen (between materia and study mode)
      if (!selectedTema) {
        const totalCards = filteredByMateria.length;
        const materiaObj = materias.find(m => m.id === selectedMateria);
        const modulos = getModulos(selectedMateria) || materiaObj?.modulos || null;
        const hasModulos = modulos && modulos.length > 0;

        // Collect all temas that have cards (for unmatched fallback)
        const temasFromCards = [...new Set(filteredByMateria.map(f => f.tema).filter(Boolean))];

        return (
          <>
            <div className="screen-content">
              <button className="back-btn" onClick={() => onSelectMateria(null)}>← Flashcards</button>
              <h2 className="section-title">{backLabel}</h2>
              <p style={{ color: 'var(--text-secondary)', fontSize: '14px', marginBottom: '16px' }}>
                Selecione um assunto ou estude todos:
              </p>
              <div className="subject-select-list">
                {/* Opção: todos os cards */}
                <div className="subject-select-card" onClick={() => setSelectedTema('__todos__')}
                  style={{ borderColor: 'var(--primary)', background: 'rgba(0,180,216,0.06)' }}>
                  <div className="subject-select-icon" style={{ background: 'rgba(0,180,216,0.15)', fontSize: '20px' }}>📚</div>
                  <div className="subject-select-info">
                    <div className="subject-select-name">Todos os assuntos</div>
                    <div className="subject-select-meta">{totalCards} flashcards</div>
                  </div>
                  <div style={{ color: 'var(--primary)' }}><IconChevronRight /></div>
                </div>

                {hasModulos ? (
                  // Show organized by modules
                  modulos.map((mod, mi) => {
                    const temasWithCards = mod.temas.filter(t => filteredByMateria.some(f => f.tema === t.id));
                    if (temasWithCards.length === 0) return null;
                    return (
                      <div key={mi} style={{ marginBottom: '4px' }}>
                        <div style={{
                          fontSize: '0.72rem', fontWeight: 700, textTransform: 'uppercase',
                          letterSpacing: '0.06em', color: 'var(--text-secondary)',
                          padding: '10px 4px 6px', borderTop: '1px solid rgba(255,255,255,0.06)'
                        }}>{mod.nome}</div>
                        {temasWithCards.map(tema => {
                          const cards = filteredByMateria.filter(f => f.tema === tema.id);
                          const dueCount = SM2.getDueCards(cards, srData).length;
                          return (
                            <div key={tema.id} className="subject-select-card" onClick={() => setSelectedTema(tema.id)}>
                              <div className="subject-select-icon" style={{ background: 'rgba(139,92,246,0.12)', fontSize: '16px' }}>📖</div>
                              <div className="subject-select-info">
                                <div className="subject-select-name">{tema.nome}</div>
                                <div className="subject-select-meta">
                                  {cards.length} cards{dueCount > 0 ? ` — ${dueCount} para revisar` : ' — em dia'}
                                </div>
                              </div>
                              <div style={{ color: 'var(--text-secondary)' }}><IconChevronRight /></div>
                            </div>
                          );
                        })}
                      </div>
                    );
                  })
                ) : (
                  // Fallback: flat list from card data
                  temasFromCards.sort().map(tema => {
                    const count = filteredByMateria.filter(f => f.tema === tema).length;
                    const dueCount = SM2.getDueCards(filteredByMateria.filter(f => f.tema === tema), srData).length;
                    return (
                      <div key={tema} className="subject-select-card" onClick={() => setSelectedTema(tema)}>
                        <div className="subject-select-icon" style={{ background: 'rgba(139,92,246,0.12)', fontSize: '18px' }}>📖</div>
                        <div className="subject-select-info">
                          <div className="subject-select-name">{tema}</div>
                          <div className="subject-select-meta">
                            {count} cards{dueCount > 0 ? ` — ${dueCount} para revisar` : ' — em dia'}
                          </div>
                        </div>
                        <div style={{ color: 'var(--text-secondary)' }}><IconChevronRight /></div>
                      </div>
                    );
                  })
                )}
              </div>
            </div>
          </>
        );
      }

      // Resolve display label for the selected tema
      const modulosForLabel = getModulos(selectedMateria) || materias.find(m => m.id === selectedMateria)?.modulos || [];
      const temaObjForLabel = modulosForLabel.flatMap(mod => mod.temas).find(t => t.id === selectedTema);

      // When selectedTema is '__todos__', use all cards from materia
      const temaLabel = selectedTema === '__todos__' ? 'Todos os assuntos' : (temaObjForLabel?.nome || selectedTema);

      // Study mode selection screen
      if (!studyMode) {
        const dueCount = SM2.getDueCards(filtered, srData).length;
        return (
          <>
            <div className="screen-content">
              <button className="back-btn" onClick={() => setSelectedTema(null)}>← {backLabel}</button>
              <h2 className="section-title" style={{ fontSize: '16px' }}>{temaLabel}</h2>
              <p style={{ color: 'var(--text-secondary)', fontSize: '14px', marginBottom: '8px' }}>
                {filtered.length} cards disponíveis. Escolha o modo:
              </p>
              <div className="study-mode-selector">
                <button className="study-mode-btn" onClick={() => setStudyMode('sm2')} disabled={dueCount === 0}>
                  <span className="study-mode-icon">🧠</span>
                  <div>
                    <div className="study-mode-title">Revisão Espaçada</div>
                    <div className="study-mode-desc">{dueCount > 0 ? `${dueCount} cards para revisar hoje` : 'Nenhum pendente hoje'}</div>
                  </div>
                </button>
                <button className="study-mode-btn" onClick={() => setStudyMode('random')}>
                  <span className="study-mode-icon">🎲</span>
                  <div>
                    <div className="study-mode-title">Aleatório</div>
                    <div className="study-mode-desc">Todos os {filtered.length} cards embaralhados</div>
                  </div>
                </button>
                <button className="study-mode-btn" onClick={() => setStudyMode('sequential')}>
                  <span className="study-mode-icon">📋</span>
                  <div>
                    <div className="study-mode-title">Sequencial</div>
                    <div className="study-mode-desc">Todos os {filtered.length} cards em ordem</div>
                  </div>
                </button>
              </div>
            </div>
          </>
        );
      }

      // Session complete
      if (sessionComplete) {
        return (
          <>
            <div className="screen-content">
              <div className="session-complete">
                <div className="session-icon">🎉</div>
                <h2 className="session-title">Sessão Concluída!</h2>
                <div className="session-stats">
                  <div className="session-stat">
                    <span className="session-stat-label">Cards Revisados</span>
                    <span className="session-stat-value">{sessionStats.total}</span>
                  </div>
                  <div className="session-stat">
                    <span className="session-stat-label">Acertos</span>
                    <span className="session-stat-value">{sessionStats.correct}</span>
                  </div>
                  <div className="session-stat">
                    <span className="session-stat-label">Taxa de Acerto</span>
                    <span className="session-stat-value">
                      {Math.round((sessionStats.correct / Math.max(sessionStats.total, 1)) * 100)}%
                    </span>
                  </div>
                </div>
                <button className="btn btn-primary" onClick={resetSession}>Nova Sessão</button>
                <button className="btn btn-secondary mt-2" onClick={() => { setStudyMode(null); setSelectedTema(null); }}>Escolher outro assunto</button>
              </div>
            </div>
          </>
        );
      }

      // No cards
      if (deck.length === 0) {
        return (
          <>
            <div className="screen-content">
              <button className="back-btn" onClick={() => setStudyMode(null)}>← {temaLabel}</button>
              <div style={{ textAlign: 'center', marginTop: '60px' }}>
                <div style={{ fontSize: '60px', marginBottom: '20px' }}>✨</div>
                <p style={{ color: 'var(--text-secondary)', marginBottom: '20px' }}>
                  Nenhum card para revisar agora!
                </p>
                <p style={{ color: 'var(--text-secondary)', fontSize: '13px' }}>
                  Todos os cards estão em dia. Volte mais tarde.
                </p>
                <button className="btn btn-secondary mt-2" style={{ marginTop: '20px' }} onClick={() => setStudyMode(null)}>Escolher outro modo</button>
              </div>
            </div>
          </>
        );
      }

      // Flashcard study session
      return (
        <>
          <div className="screen-content">
            <button className="back-btn" onClick={() => setStudyMode(null)}>
              ← {temaLabel}
            </button>

            <div className="flashcard-progress" style={{ marginBottom: '16px' }}>
              <div style={{ textAlign: 'center', fontSize: '13px', color: 'var(--text-secondary)', marginBottom: '8px' }}>
                {currentIndex + 1} de {deck.length}
              </div>
              <div className="progress-dots">
                {deck.slice(0, Math.min(deck.length, 30)).map((card, idx) => (
                  <div
                    key={idx}
                    className={`progress-dot ${idx === currentIndex ? 'current' : ''} ${idx < currentIndex ? 'completed' : ''}`}
                  ></div>
                ))}
                {deck.length > 30 && <span style={{ color: 'var(--text-secondary)', fontSize: '11px' }}>+{deck.length - 30}</span>}
              </div>
            </div>

            <div className="flashcard-container">
              <div className="flashcard">
                <div
                  className={`flashcard-inner ${isFlipped ? 'flipped' : ''}`}
                  onClick={() => setIsFlipped(!isFlipped)}
                  style={{ cursor: 'pointer' }}
                >
                  <div className="flashcard-front">
                    <div className="flashcard-label">Pergunta</div>
                    <div className="flashcard-text">{currentCard.pergunta}</div>
                    <div style={{ fontSize: '12px', color: 'var(--text-secondary)', marginTop: '8px' }}>Toque para ver a resposta</div>
                  </div>
                  <div className="flashcard-back">
                    <div className="flashcard-label">Resposta</div>
                    <div className="flashcard-text">{currentCard.resposta}</div>
                  </div>
                </div>
              </div>
            </div>

            <div className="flashcard-actions">
              <button className="rate-btn error" onClick={() => handleRate(1)}>
                <IconX />
                Errei
              </button>
              <button className="rate-btn warning" onClick={() => handleRate(3)}>
                <IconClock />
                Difícil
              </button>
              <button className="rate-btn success" onClick={() => handleRate(5)}>
                <IconCheck />
                Fácil
              </button>
            </div>
          </div>
        </>
      );
    };

    // Quiz Screen
    const QuizScreen = ({ flashcards, materias, selectedMateria, onSelectMateria, userSemester }) => {
      const [activeQuiz, setActiveQuiz] = useState(null);
      const [activeTema, setActiveTema] = useState(null); // assunto selecionado dentro da materia
      const [showTemaSelector, setShowTemaSelector] = useState(false); // showing tema list for a materia
      const [pendingQuiz, setPendingQuiz] = useState(null); // materia waiting for tema selection
      const [currentQuestion, setCurrentQuestion] = useState(0);
      const [selectedOption, setSelectedOption] = useState(null);
      const [crossedOut, setCrossedOut] = useState(new Set());
      const [answered, setAnswered] = useState(false);
      const [quizStats, setQuizStats] = useState({ correct: 0, total: 0 });
      const [startTime, setStartTime] = useState(Date.now());
      const [quizComplete, setQuizComplete] = useState(false);
      const [semesterFilter, setSemesterFilter] = useState(userSemester || null);
      const [categoryFilter, setCategoryFilter] = useState('todas');
      const [searchQuery, setSearchQuery] = useState('');

      // Separate real quiz questions from flashcards
      const quizQuestions = useMemo(() => {
        return flashcards.filter(f => f.tipo === 'quiz' && f.opcoes && f.opcoes.length > 0);
      }, [flashcards]);

      const quizzes = useMemo(() => {
        const grouped = {};
        materias.forEach(m => {
          const questions = quizQuestions.filter(f => f.materia === m.id);
          if (questions.length > 0) {
            grouped[m.id] = { name: m.nome, sigla: m.sigla, cards: questions, icon: m.icon, semestre: m.semestre };
          }
        });
        return grouped;
      }, [quizQuestions, materias]);

      const filteredQuizzes = useMemo(() => {
        let result = { ...quizzes };
        // semester filter
        if (semesterFilter) {
          const f = {};
          Object.entries(result).forEach(([id, q]) => {
            if (q.semestre === semesterFilter) f[id] = q;
          });
          result = f;
        }
        // category filter — filter cards inside each quiz
        if (categoryFilter !== 'todas') {
          const f = {};
          Object.entries(result).forEach(([id, q]) => {
            const cards = q.cards.filter(c => c.categoria === categoryFilter);
            if (cards.length > 0) f[id] = { ...q, cards };
          });
          result = f;
        }
        // search filter
        if (searchQuery) {
          const f = {};
          Object.entries(result).forEach(([id, q]) => {
            if (fuzzyMatch(searchQuery, q.name) || fuzzyMatch(searchQuery, q.sigla || '')) f[id] = q;
          });
          result = f;
        }
        return result;
      }, [quizzes, semesterFilter, categoryFilter, searchQuery]);

      const handleQuizStart = (materiaId, temaFilter) => {
        setActiveQuiz(materiaId);
        setActiveTema(temaFilter || null);
        setCurrentQuestion(0);
        setSelectedOption(null);
        setCrossedOut(new Set());
        setAnswered(false);
        setQuizStats({ correct: 0, total: 0 });
        setStartTime(Date.now());
        setShowTemaSelector(false);
        setPendingQuiz(null);
      };

      const handleMateriaClick = (materiaId) => {
        // Check if this materia has multiple temas
        const cards = quizzes[materiaId]?.cards || [];
        const temas = [...new Set(cards.map(c => c.tema).filter(Boolean))];
        if (temas.length > 1) {
          setPendingQuiz(materiaId);
          setShowTemaSelector(true);
        } else {
          handleQuizStart(materiaId, null);
        }
      };

      const toggleCross = (idx) => {
        const next = new Set(crossedOut);
        if (next.has(idx)) next.delete(idx);
        else next.add(idx);
        if (selectedOption === idx) setSelectedOption(null);
        setCrossedOut(next);
      };

      const getActiveCards = () => {
        if (!activeQuiz) return [];
        const quiz = quizzes[activeQuiz];
        if (!quiz) return [];
        return activeTema ? quiz.cards.filter(c => c.tema === activeTema) : quiz.cards;
      };

      const handleAnswer = () => {
        const activeCards = getActiveCards();
        const card = activeCards[currentQuestion];
        const correct = selectedOption === card.correta;

        if (correct) {
          setQuizStats(prev => ({ ...prev, correct: prev.correct + 1 }));
        }
        setAnswered(true);
      };

      const handleNextQuestion = () => {
        const activeCards = getActiveCards();
        if (currentQuestion < activeCards.length - 1) {
          setCurrentQuestion(currentQuestion + 1);
          setSelectedOption(null);
          setCrossedOut(new Set());
          setAnswered(false);
        } else {
          const card = activeCards[currentQuestion];
          const lastCorrect = selectedOption === card.correta;
          const finalCorrect = quizStats.correct + (lastCorrect && !answered ? 1 : 0);
          setQuizComplete(true);
          const quizHistory = JSON.parse(localStorage.getItem('meduni9_quiz_history') || '[]');
          quizHistory.push({
            date: new Date().toISOString(),
            materia: activeQuiz,
            score: finalCorrect,
            total: getActiveCards().length,
            time: formatTime(Date.now() - startTime)
          });
          localStorage.setItem('meduni9_quiz_history', JSON.stringify(quizHistory));
        }
      };

      const handleRestartQuiz = () => {
        handleQuizStart(activeQuiz, activeTema);
        setQuizComplete(false);
      };

      if (quizComplete) {
        const activeCards = getActiveCards();
        const percentage = Math.round((quizStats.correct / Math.max(activeCards.length, 1)) * 100);

        return (
          <>
            <div className="screen-content">
              <div className="quiz-result-screen">
                <div style={{ fontSize: '60px', marginBottom: '20px' }}>
                  {percentage >= 70 ? '🎉' : percentage >= 50 ? '👍' : '💪'}
                </div>
                <div className="quiz-score">{percentage}%</div>
                <p style={{ color: 'var(--text-secondary)', marginBottom: '8px' }}>
                  {quizStats.correct} de {activeCards.length} questões
                  {activeTema && <span> — {activeTema}</span>}
                </p>
                <div className="quiz-time">{formatTime(Date.now() - startTime)}</div>
                <div style={{ marginTop: '32px', display: 'flex', flexDirection: 'column', gap: '12px' }}>
                  <button className="btn btn-primary" onClick={handleRestartQuiz}>Tentar Novamente</button>
                  <button className="btn btn-secondary" onClick={() => { setActiveQuiz(null); setActiveTema(null); setQuizComplete(false); }}>Voltar</button>
                </div>
              </div>
            </div>
          </>
        );
      }

      // Tema selector screen for quiz
      if (showTemaSelector && pendingQuiz) {
        const quiz = quizzes[pendingQuiz];
        const modulosQ = getModulos(pendingQuiz) || materias.find(m => m.id === pendingQuiz)?.modulos || null;
        const hasModulosQ = modulosQ && modulosQ.length > 0;
        const temasFromCardsQ = [...new Set(quiz.cards.map(c => c.tema).filter(Boolean))];

        return (
          <>
            <div className="screen-content">
              <button className="back-btn" onClick={() => { setShowTemaSelector(false); setPendingQuiz(null); }}>← Simulados</button>
              <h2 className="section-title">{quiz.sigla || quiz.name}</h2>
              <p style={{ color: 'var(--text-secondary)', fontSize: '14px', marginBottom: '16px' }}>Escolha um assunto:</p>
              <div className="subject-select-list">
                <div className="subject-select-card" onClick={() => handleQuizStart(pendingQuiz, null)}
                  style={{ borderColor: 'var(--primary)', background: 'rgba(0,180,216,0.06)' }}>
                  <div className="subject-select-icon" style={{ background: 'rgba(0,180,216,0.15)' }}>📋</div>
                  <div className="subject-select-info">
                    <div className="subject-select-name">Todas as questões</div>
                    <div className="subject-select-meta">{quiz.cards.length} questões</div>
                  </div>
                  <div style={{ color: 'var(--primary)' }}><IconChevronRight /></div>
                </div>
                {hasModulosQ ? (
                  modulosQ.map((mod, mi) => {
                    const temasWithCards = mod.temas.filter(t => quiz.cards.some(c => c.tema === t.id));
                    if (temasWithCards.length === 0) return null;
                    return (
                      <div key={mi}>
                        <div style={{
                          fontSize: '0.72rem', fontWeight: 700, textTransform: 'uppercase',
                          letterSpacing: '0.06em', color: 'var(--text-secondary)',
                          padding: '10px 4px 6px', borderTop: '1px solid rgba(255,255,255,0.06)'
                        }}>{mod.nome}</div>
                        {temasWithCards.map(tema => {
                          const count = quiz.cards.filter(c => c.tema === tema.id).length;
                          return (
                            <div key={tema.id} className="subject-select-card" onClick={() => handleQuizStart(pendingQuiz, tema.id)}>
                              <div className="subject-select-icon" style={{ background: 'rgba(139,92,246,0.12)' }}>📖</div>
                              <div className="subject-select-info">
                                <div className="subject-select-name">{tema.nome}</div>
                                <div className="subject-select-meta">{count} questões</div>
                              </div>
                              <div style={{ color: 'var(--text-secondary)' }}><IconChevronRight /></div>
                            </div>
                          );
                        })}
                      </div>
                    );
                  })
                ) : (
                  temasFromCardsQ.sort().map(tema => {
                    const count = quiz.cards.filter(c => c.tema === tema).length;
                    return (
                      <div key={tema} className="subject-select-card" onClick={() => handleQuizStart(pendingQuiz, tema)}>
                        <div className="subject-select-icon" style={{ background: 'rgba(139,92,246,0.12)' }}>📖</div>
                        <div className="subject-select-info">
                          <div className="subject-select-name">{tema}</div>
                          <div className="subject-select-meta">{count} questões</div>
                        </div>
                        <div style={{ color: 'var(--text-secondary)' }}><IconChevronRight /></div>
                      </div>
                    );
                  })
                )}
              </div>
            </div>
          </>
        );
      }

      if (activeQuiz) {
        const quiz = quizzes[activeQuiz];
        const activeCards = getActiveCards();
        const card = activeCards[currentQuestion];
        const progress = ((currentQuestion + 1) / activeCards.length) * 100;

        return (
          <>
            <div className="screen-content">
              <button className="back-btn" onClick={() => { setActiveQuiz(null); setActiveTema(null); }}>
                ← {activeTema || quiz.sigla || quiz.name}
              </button>
              <div className="quiz-screen">
                <div className="quiz-progress-section">
                  <div className="quiz-progress-bar">
                    <div className="quiz-progress-fill" style={{ width: `${progress}%` }}></div>
                  </div>
                  <div className="quiz-counter">
                    {currentQuestion + 1} de {activeCards.length}
                    {card.tema && !activeTema && <span style={{ marginLeft: '8px', color: 'var(--primary)', fontSize: '11px' }}>{card.tema}</span>}
                  </div>
                </div>

                <div className="quiz-question-card">
                  <div className="quiz-question">{card.pergunta}</div>
                </div>

                <div className="quiz-options">
                  {card.opcoes.map((option, idx) => (
                    <div
                      key={idx}
                      className={`quiz-option ${
                        crossedOut.has(idx) ? 'crossed-out' : ''
                      } ${
                        selectedOption === idx && !answered ? 'selected' : ''
                      } ${
                        answered && idx === card.correta ? 'correct' : ''
                      } ${
                        answered && selectedOption === idx && idx !== card.correta ? 'incorrect' : ''
                      }`}
                      onClick={() => {
                        if (!answered && !crossedOut.has(idx)) setSelectedOption(idx);
                      }}
                    >
                      <span>{option}</span>
                      {!answered && !crossedOut.has(idx) && (
                        <button
                          className="cross-btn"
                          onClick={(e) => { e.stopPropagation(); toggleCross(idx); }}
                          title="Riscar alternativa"
                        >✕</button>
                      )}
                    </div>
                  ))}
                </div>

                {answered && card.explicacao && (
                  <div className="quiz-feedback">
                    <div className="quiz-feedback-title">
                      {selectedOption === card.correta ? '✓ Correto!' : '✗ Incorreto'}
                    </div>
                    <p style={{ color: 'var(--text-secondary)', lineHeight: '1.6' }}>{card.explicacao}</p>
                  </div>
                )}

                {!answered ? (
                  <button
                    className="btn btn-primary"
                    onClick={handleAnswer}
                    disabled={selectedOption === null}
                  >
                    Confirmar Resposta
                  </button>
                ) : (
                  <button className="btn btn-primary" onClick={handleNextQuestion}>
                    {currentQuestion === activeCards.length - 1 ? 'Finalizar' : 'Próxima Questão'}
                  </button>
                )}
              </div>
            </div>
          </>
        );
      }

      // Quiz list with semester filter, category tabs, search
      const semesters = [...new Set(Object.values(quizzes).map(q => q.semestre))].sort((a,b) => a-b);

      return (
        <>
          <div className="screen-content">
            <h2 className="section-title">Simulados</h2>

            {/* Category tabs */}
            <div className="category-tabs">
              {[['todas','Todas'],['antiga','Questões Antigas'],['inedita','Inéditas']].map(([val, label]) => (
                <button
                  key={val}
                  className={`category-tab ${categoryFilter === val ? 'active' : ''}`}
                  onClick={() => setCategoryFilter(val)}
                >{label}</button>
              ))}
            </div>

            {semesters.length > 1 && (
              <div className="semester-tabs">
                <button
                  className={`semester-tab ${!semesterFilter ? 'active' : ''}`}
                  onClick={() => setSemesterFilter(null)}
                >Todos</button>
                {semesters.map(s => (
                  <button
                    key={s}
                    className={`semester-tab ${semesterFilter === s ? 'active' : ''}`}
                    onClick={() => setSemesterFilter(s)}
                  >{s}º sem</button>
                ))}
              </div>
            )}

            <div className="subject-search-wrap">
              <span className="subject-search-icon">🔍</span>
              <input
                type="search"
                className="subject-search"
                placeholder="Buscar matéria..."
                value={searchQuery}
                onChange={e => setSearchQuery(e.target.value)}
              />
            </div>

            <div className="subject-select-list">
              {Object.entries(filteredQuizzes).length === 0 && (
                <div style={{ textAlign: 'center', padding: '40px 0', color: 'var(--text-secondary)' }}>
                  <p>Nenhum simulado encontrado.</p>
                </div>
              )}
              {Object.entries(filteredQuizzes).map(([id, quiz]) => (
                <div key={id} className="subject-select-card" onClick={() => handleMateriaClick(id)}>
                  <div className="subject-select-icon" style={{ background: 'rgba(0, 180, 216, 0.1)' }}>
                    {quiz.icon}
                  </div>
                  <div className="subject-select-info">
                    <div className="subject-select-name">{quiz.sigla || quiz.name}</div>
                    <div className="subject-select-meta">{quiz.cards.length} questões — {quiz.semestre}º sem</div>
                  </div>
                  <div style={{ color: 'var(--text-secondary)' }}>
                    <IconChevronRight />
                  </div>
                </div>
              ))}
            </div>
          </div>
        </>
      );
    };

    // Materials Screen
    const MaterialsScreen = ({ materias }) => {
      const [expandedMaterias, setExpandedMaterias] = useState({});

      const toggleMateria = (id) => {
        setExpandedMaterias(prev => ({ ...prev, [id]: !prev[id] }));
      };

      const getMateriaModulos = (materia) => getModulos(materia.id) || materia.modulos || null;

      const totalTemas = (materia) => {
        const mods = getMateriaModulos(materia);
        if (!mods) return 0;
        return mods.reduce((acc, mod) => acc + (mod.temas?.length || 0), 0);
      };

      return (
        <>
          <div className="screen-content">
            <h2 className="section-title">Materiais de Apoio</h2>
            <div className="materials-list">
              {materias.map(materia => {
                const total = totalTemas(materia);
                const isExpanded = expandedMaterias[materia.id];
                return (
                  <div key={materia.id} className="material-subject">
                    <div className="material-subject-name" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                      <span>{materia.icon} {materia.sigla || materia.nome}</span>
                      {total > 0 && (
                        <button
                          onClick={() => toggleMateria(materia.id)}
                          style={{
                            background: 'rgba(255,255,255,0.06)',
                            border: '1px solid rgba(255,255,255,0.12)',
                            borderRadius: '8px',
                            color: 'var(--text-secondary)',
                            fontSize: '0.78rem',
                            padding: '4px 10px',
                            cursor: 'pointer',
                            display: 'flex',
                            alignItems: 'center',
                            gap: '5px'
                          }}
                        >
                          {isExpanded ? '▲' : '▼'} {total} aulas
                        </button>
                      )}
                    </div>

                    {total > 0 && isExpanded && (
                      <div style={{ marginTop: '10px', marginBottom: '4px' }}>
                        {getMateriaModulos(materia).map((mod, mi) => (
                          <div key={mi} style={{ marginBottom: '10px' }}>
                            <div style={{
                              fontSize: '0.72rem',
                              fontWeight: 700,
                              textTransform: 'uppercase',
                              letterSpacing: '0.06em',
                              color: 'var(--text-secondary)',
                              marginBottom: '6px',
                              paddingLeft: '2px'
                            }}>{mod.nome}</div>
                            {mod.temas.map((tema, ti) => (
                              <div key={ti} style={{
                                display: 'flex',
                                alignItems: 'flex-start',
                                gap: '8px',
                                padding: '7px 10px',
                                borderRadius: '8px',
                                background: 'rgba(255,255,255,0.03)',
                                border: '1px solid rgba(255,255,255,0.06)',
                                marginBottom: '4px'
                              }}>
                                <span style={{ color: materia.cor || 'var(--primary)', fontSize: '0.85rem', marginTop: '1px' }}>•</span>
                                <div>
                                  <div style={{ fontSize: '0.88rem', color: 'var(--text-primary)', fontWeight: 500 }}>{tema.nome}</div>
                                  {tema.descricao && (
                                    <div style={{ fontSize: '0.75rem', color: 'var(--text-secondary)', marginTop: '2px' }}>{tema.descricao}</div>
                                  )}
                                </div>
                              </div>
                            ))}
                          </div>
                        ))}
                      </div>
                    )}

                    <div className="material-slots" style={{ marginTop: total > 0 ? '8px' : undefined }}>
                      <div className="material-slot">
                        <span className="material-slot-name">📄 Resumo Didático</span>
                        <span className="material-badge">Em breve</span>
                      </div>
                      <div className="material-slot">
                        <span className="material-slot-name">📊 Análise de Provas</span>
                        <span className="material-badge">Em breve</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </>
      );
    };

    // Profile Screen
    const ProfileScreen = ({ user, onLogout, onChangeSemester }) => {
      const [stats, setStats] = useState({
        cardsReviewed: 0,
        questionsAnswered: 0,
        streak: 0,
        studyHours: 0
      });

      useEffect(() => {
        const srData = JSON.parse(localStorage.getItem('meduni9_sr_data') || '{}');
        const quizHistory = JSON.parse(localStorage.getItem('meduni9_quiz_history') || '[]');

        setStats({
          cardsReviewed: Object.keys(srData).length,
          questionsAnswered: quizHistory.length,
          streak: 5,
          studyHours: Math.floor(quizHistory.length * 0.5)
        });
      }, []);

      return (
        <>
          <div className="screen-content">
            <h2 className="section-title">Perfil</h2>

            <div className="profile-section">
              <div className="profile-item">
                <span className="profile-label">Email</span>
                <span className="profile-value">{user.email}</span>
              </div>
              <div className="profile-item">
                <span className="profile-label">Semestre</span>
                <span className="profile-value" style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                  {user.semestre || 1}º semestre
                  <button
                    className="semester-tab"
                    style={{ fontSize: '11px', padding: '4px 10px' }}
                    onClick={onChangeSemester}
                  >Trocar</button>
                </span>
              </div>
              <div className="profile-item">
                <span className="profile-label">Código</span>
                <span className="profile-value">{user.code}</span>
              </div>
              <div className="profile-item">
                <span className="profile-label">Plano</span>
                <span className="profile-value">Básico</span>
              </div>
            </div>

            <div className="profile-stats">
              <div className="profile-stat">
                <div className="profile-stat-value">{stats.cardsReviewed}</div>
                <div className="profile-stat-label">Cards</div>
              </div>
              <div className="profile-stat">
                <div className="profile-stat-value">{stats.questionsAnswered}</div>
                <div className="profile-stat-label">Questões</div>
              </div>
              <div className="profile-stat">
                <div className="profile-stat-value">{stats.streak}</div>
                <div className="profile-stat-label">Sequência</div>
              </div>
              <div className="profile-stat">
                <div className="profile-stat-value">{stats.studyHours}h</div>
                <div className="profile-stat-label">Estudo</div>
              </div>
            </div>

            <button className="btn btn-error" onClick={onLogout} style={{ marginTop: '24px' }}>
              <IconLogOut />
              Fazer Logout
            </button>

            <div style={{ textAlign: 'center', marginTop: '32px', paddingBottom: '20px' }}>
              <p style={{ color: 'var(--text-secondary)', fontSize: '12px' }}>
                MedUni9 v1.0.0
              </p>
            </div>
          </div>
        </>
      );
    };

    // ===================== Main App =====================
    function normalizeText(str) {
      return (str || '').toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/\s+/g, '').replace(/[^a-z0-9]/g, '');
    }
    function fuzzyMatch(query, target) {
      const q = normalizeText(query);
      const t = normalizeText(target);
      if (!q) return true;
      if (t.includes(q)) return true;
      let qi = 0;
      for (let ti = 0; ti < t.length && qi < q.length; ti++) {
        if (t[ti] === q[qi]) qi++;
      }
      return qi === q.length;
    }

    const MedUni9App = () => {
      const [stage, setStage] = useState('splash'); // splash, auth, app
      const [user, setUser] = useState(null);
      const [currentTab, setCurrentTab] = useState('home');
      const [materias, setMaterias] = useState([]);
      const [flashcards, setFlashcards] = useState([]);
      const [selectedMateria, setSelectedMateria] = useState(null);
      const [loading, setLoading] = useState(true);
      const [sidebarOpen, setSidebarOpen] = useState(true);

      useEffect(() => {
        // Check if user is already logged in
        const savedUser = localStorage.getItem('meduni9_user');
        if (savedUser) {
          setUser(JSON.parse(savedUser));
          setStage('app');
        }
      }, []);

      useEffect(() => {
        // Load data when app starts
        if (stage === 'app' && loading) {
          loadAppData();
        }
      }, [stage, loading]);

      const loadAppData = async () => {
        try {
          // Load data from external JSON files
          const [materiasRes, flashcardsRes, questoesRes] = await Promise.all([
            fetch('data/materias.json').catch(() => null),
            fetch('data/flashcards.json').catch(() => null),
            fetch('data/questoes.json').catch(() => null)
          ]);

          let materiasData = [];
          let flashcardsData = [];

          if (materiasRes && materiasRes.ok) {
            const raw = await materiasRes.json();
            // Convert object format to array with id
            materiasData = Object.entries(raw)
              .filter(([k]) => !k.startsWith('_'))
              .map(([id, val]) => ({ id, ...val, pergunta: val.frente, resposta: val.verso }));
          }

          if (flashcardsRes && flashcardsRes.ok) {
            const raw = await flashcardsRes.json();
            const cards = raw.flashcards || raw;
            flashcardsData = (Array.isArray(cards) ? cards : []).map(c => ({
              ...c,
              pergunta: c.frente || c.pergunta,
              resposta: c.verso || c.resposta
            }));
          }

          if (questoesRes && questoesRes.ok) {
            const raw = await questoesRes.json();
            const questoes = raw.questoes || raw;
            const questoesArray = Array.isArray(questoes) ? questoes : [];
            // Merge questoes as flashcards with quiz format
            questoesArray.forEach(q => {
              flashcardsData.push({
                id: 'q_' + q.id,
                materia: q.materia,
                pergunta: q.enunciado,
                resposta: q.opcoes[q.correta].replace(/^[A-D]\)\s*/, ''),
                explicacao: q.explicacao,
                opcoes: q.opcoes,
                correta: q.correta,
                tipo: 'quiz',
                tema: q.tema,
                dificuldade: q.dificuldade
              });
            });
          }

          // Fallback if no JSON files loaded
          if (materiasData.length === 0) {
            materiasData = [
              { id: 'bcm1', nome: 'BCM 1 - Bioquímica/Genética', sigla: 'BCM1', icon: '🧬', semestre: 1, cor: '#3498DB' },
              { id: 'bmf1', nome: 'BMF 1 - Anatomia/Histologia', sigla: 'BMF1', icon: '🦴', semestre: 1, cor: '#E74C3C' },
              { id: 'ips1', nome: 'Introd. Práticas de Saúde', sigla: 'IPS', icon: '🏥', semestre: 1, cor: '#2ECC71' },
              { id: 'scaps1', nome: 'SCAPS 1 - Saúde Coletiva', sigla: 'SCAPS1', icon: '🏘️', semestre: 1, cor: '#9B59B6' },
              { id: 'bcm2', nome: 'BCM 2 - Fisiologia/Micro', sigla: 'BCM2', icon: '❤️', semestre: 2, cor: '#E67E22' },
              { id: 'bmf2', nome: 'BMF 2 - Cardio/Resp/Digest', sigla: 'BMF2', icon: '🫁', semestre: 2, cor: '#1ABC9C' },
              { id: 'mad1', nome: 'MAD 1 - Imunologia/Patologia', sigla: 'MAD1', icon: '🛡️', semestre: 2, cor: '#E91E63' },
              { id: 'farmacologia1', nome: 'Farmacologia 1', sigla: 'FARM1', icon: '💊', semestre: 4, cor: '#00BCD4' },
              { id: 'semiologia', nome: 'Propedêutica/Semiologia', sigla: 'SEMIO', icon: '🩺', semestre: 4, cor: '#4CAF50' }
            ];
          }

          if (flashcardsData.length === 0) {
            flashcardsData = [
              { id: 'fc1', materia: 'bcm1', pergunta: 'Como interpretar uma gasometria com pH=7.28, pCO2=32, HCO3=15?', resposta: 'Acidose metabólica com compensação respiratória. O pH baixo indica acidemia, HCO3 baixo confirma origem metabólica, pCO2 reduzido mostra hiperventilação compensatória.' },
              { id: 'fc2', materia: 'bcm1', pergunta: 'Qual molécula regula a fluidez da membrana plasmática?', resposta: 'O colesterol. Ele se intercala entre os fosfolipídeos, reduzindo a fluidez em altas temperaturas e impedindo a solidificação em baixas temperaturas.' },
              { id: 'fc3', materia: 'bmf1', pergunta: 'Qual célula é responsável pela síntese de matriz óssea?', resposta: 'O osteoblasto. Ele sintetiza e secreta os componentes orgânicos da matriz óssea (colágeno tipo I e proteoglicanos), participando da mineralização.' },
              { id: 'fc4', materia: 'bmf1', pergunta: 'Quais as duas camadas do periósteo e suas funções?', resposta: 'Camada externa (fibrosa): rica em fibras colágenas tipo I, proteção mecânica. Camada interna (celular/osteogênica): rica em células osteoprogenitoras, responsável pelo crescimento aposicional.' },
              { id: 'fc5', materia: 'ips1', pergunta: 'Qual o nome oficial do vírus causador da pandemia de COVID-19?', resposta: 'SARS-CoV-2 (Severe Acute Respiratory Syndrome Coronavirus 2). Foi nomeado pela semelhança com o SARS-CoV de 2002.' },
              { id: 'fc6', materia: 'ips1', pergunta: 'Quais são dois protocolos básicos do PNSP?', resposta: 'Identificação do paciente e prevenção de quedas. Outros incluem: segurança na prescrição, cirurgia segura, prevenção de infecções e úlceras por pressão.' }
            ];
          }

          setMaterias(materiasData);
          setFlashcards(flashcardsData);
          setLoading(false);
        } catch (error) {
          console.error('Erro ao carregar dados:', error);
          setLoading(false);
        }
      };

      const handleAuthSuccess = (userData) => {
        setUser(userData);
        setStage('app');
      };

      const handleLogout = () => {
        localStorage.removeItem('meduni9_user');
        localStorage.removeItem('meduni9_sr_data');
        localStorage.removeItem('meduni9_quiz_history');
        localStorage.removeItem('meduni9_stats');
        setUser(null);
        setStage('auth');
        setCurrentTab('home');
      };

      if (stage === 'splash') {
        return <SplashScreen onComplete={() => {
          const savedUser = localStorage.getItem('meduni9_user');
          if (savedUser) {
            setUser(JSON.parse(savedUser));
            setStage('app');
          } else {
            setStage('auth');
          }
        }} />;
      }

      if (stage === 'auth') {
        return <AuthScreen onAuthSuccess={handleAuthSuccess} />;
      }

      if (loading) {
        return (
          <div className="app-container">
            <div className="loading">
              <div className="spinner"></div>
            </div>
          </div>
        );
      }

      const handleChangeSemester = () => {
        const newSem = prompt('Digite o número do novo semestre (1-12):');
        const parsed = parseInt(newSem);
        if (parsed >= 1 && parsed <= 12) {
          const updated = { ...user, semestre: parsed };
          setUser(updated);
          localStorage.setItem('meduni9_user', JSON.stringify(updated));
        }
      };

      const navItems = [
        { id: 'home', label: 'Início', icon: <IconHome /> },
        { id: 'cards', label: 'Flashcards', icon: <IconBrain /> },
        { id: 'quiz', label: 'Simulados', icon: <IconClipboardList /> },
        { id: 'materials', label: 'Materiais', icon: <IconBookOpen /> },
        { id: 'profile', label: 'Perfil', icon: <IconUser /> },
      ];

      // App UI with desktop sidebar
      return (
        <div className="desktop-layout">
          {/* Desktop Sidebar */}
          <div className={`desktop-sidebar${sidebarOpen ? '' : ' collapsed'}`}>
            <div className="sidebar-logo">
              <button
                className="sidebar-toggle-btn"
                onClick={() => setSidebarOpen(false)}
                title="Fechar menu"
                style={{ marginRight: '4px' }}
              >☰</button>
              <span className="sidebar-logo-icon">🩺</span>
              <span className="sidebar-logo-text">MedUni9</span>
            </div>
            <div className="sidebar-nav">
              {navItems.map(item => (
                <div
                  key={item.id}
                  className={`sidebar-item ${currentTab === item.id ? 'active' : ''}`}
                  onClick={() => setCurrentTab(item.id)}
                >
                  {item.icon}
                  <span>{item.label}</span>
                </div>
              ))}
            </div>
            <div className="sidebar-footer">
              {user.semestre}º Semestre — MedUni9 v1.0
            </div>
          </div>

          {/* Main Content */}
          <div className="app-container">
            {!sidebarOpen && (
              <button
                className="sidebar-toggle-btn"
                onClick={() => setSidebarOpen(true)}
                title="Abrir menu"
                style={{ position: 'fixed', top: '16px', left: '16px', zIndex: 200 }}
              >☰</button>
            )}
            {currentTab === 'home' && (
              <DashboardScreen
                user={user}
                materias={materias}
                flashcards={flashcards}
                onSelectMateria={(id) => {
                  setSelectedMateria(id);
                  setCurrentTab('cards');
                }}
              />
            )}

            {currentTab === 'cards' && (
              <FlashcardsScreen
                flashcards={flashcards}
                materias={materias}
                selectedMateria={selectedMateria}
                onSelectMateria={setSelectedMateria}
                userSemester={user.semestre}
              />
            )}

            {currentTab === 'quiz' && (
              <QuizScreen
                flashcards={flashcards}
                materias={materias}
                selectedMateria={selectedMateria}
                onSelectMateria={setSelectedMateria}
                userSemester={user.semestre}
              />
            )}

            {currentTab === 'materials' && (
              <MaterialsScreen materias={materias} />
            )}

            {currentTab === 'profile' && (
              <ProfileScreen user={user} onLogout={handleLogout} onChangeSemester={handleChangeSemester} />
            )}

            {/* Bottom Navigation (mobile only) */}
            <div className="bottom-nav">
              {navItems.map(item => (
                <div
                  key={item.id}
                  className={`nav-item ${currentTab === item.id ? 'active' : ''}`}
                  onClick={() => setCurrentTab(item.id)}
                >
                  <div className="nav-icon">{item.icon}</div>
                  <div className="nav-label">{item.label}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    // Render App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MedUni9App />);
  </script>
</body>
</html>
