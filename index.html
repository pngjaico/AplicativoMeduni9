<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#00B4D8">
  <meta name="description" content="MedUni9 - Plataforma de estudos para alunos de medicina da Uninove Vergueiro">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%2300B4D8' width='192' height='192'/><text x='96' y='120' font-size='80' fill='white' text-anchor='middle' font-weight='bold'>🩺</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%2300B4D8' width='192' height='192'/><text x='96' y='120' font-size='80' fill='white' text-anchor='middle' font-weight='bold'>🩺</text></svg>">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #0A1628 0%, #0D2137 50%, #0F2D4A 100%);
      background-attachment: fixed;
      color: #E5E7EB;
      overflow: hidden;
    }

    #root {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Typography */
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
    }

    /* Colors */
    :root {
      --primary: #00B4D8;
      --success: #10B981;
      --warning: #F59E0B;
      --error: #EF4444;
      --purple: #8B5CF6;
      --bg-dark: #0A1628;
      --bg-card: rgba(255, 255, 255, 0.04);
      --border-card: rgba(255, 255, 255, 0.06);
      --text-primary: #E5E7EB;
      --text-secondary: #9CA3AF;
    }

    /* Main Container */
    .app-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      height: 100vh;
      background: linear-gradient(135deg, #0A1628 0%, #0D2137 50%, #0F2D4A 100%);
      position: relative;
    }

    /* Desktop layout wrapper */
    .desktop-layout {
      display: flex;
      width: 100%;
      height: 100vh;
      background: linear-gradient(135deg, #0A1628 0%, #0D2137 50%, #0F2D4A 100%);
    }

    .desktop-layout .app-container {
      max-width: none;
      margin: 0;
      height: 100%;
      flex: 1;
      min-width: 0;
    }

    /* Desktop Sidebar */
    .desktop-sidebar {
      display: none;
      width: 240px;
      min-width: 240px;
      background: rgba(10, 22, 40, 0.95);
      border-right: 1px solid var(--border-card);
      flex-direction: column;
      padding: 24px 0;
      height: 100vh;
      position: sticky;
      top: 0;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px 24px;
      border-bottom: 1px solid var(--border-card);
      margin-bottom: 16px;
    }

    .sidebar-logo-icon { font-size: 28px; }

    .sidebar-logo-text {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 0 12px;
      flex: 1;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .sidebar-item:hover {
      background: rgba(0, 180, 216, 0.08);
      color: var(--text-primary);
    }

    .sidebar-item.active {
      background: rgba(0, 180, 216, 0.15);
      color: var(--primary);
    }

    .sidebar-item svg {
      flex-shrink: 0;
    }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border-card);
      font-size: 11px;
      color: var(--text-secondary);
      text-align: center;
    }

    .screen-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 20px 16px 100px 16px;
      -webkit-overflow-scrolling: touch;
    }

    /* Hamburger/sidebar toggle button */
    .sidebar-toggle-btn {
      display: none;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border-card);
      background: rgba(255,255,255,0.05);
      color: var(--text-primary);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .sidebar-toggle-btn:hover {
      background: rgba(255,255,255,0.1);
    }

    /* Sidebar collapsed state */
    .desktop-sidebar.collapsed {
      width: 0 !important;
      min-width: 0 !important;
      padding: 0 !important;
      overflow: hidden;
      border-right: none;
    }

    /* Study mode selector */
    .study-mode-selector {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 16px;
    }
    .study-mode-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      background: var(--bg-card);
      border: 1.5px solid var(--border-card);
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
    }
    .study-mode-btn:hover {
      border-color: var(--primary);
      background: rgba(0, 180, 216, 0.07);
    }
    .study-mode-icon { font-size: 24px; }
    .study-mode-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .study-mode-desc { font-size: 12px; color: var(--text-secondary); }

    /* Search input for subjects */
    .subject-search {
      width: 100%;
      padding: 11px 14px 11px 38px;
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }
    .subject-search:focus {
      outline: none;
      border-color: var(--primary);
    }
    .subject-search-wrap {
      position: relative;
      margin-bottom: 4px;
    }
    .subject-search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      pointer-events: none;
      font-size: 15px;
    }

    /* Category tabs for questions */
    .category-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
    }
    .category-tab {
      flex: 1;
      padding: 9px 10px;
      border-radius: 10px;
      border: 1.5px solid var(--border-card);
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      min-height: auto;
      text-transform: none;
      letter-spacing: 0;
      font-family: 'DM Sans', sans-serif;
    }
    .category-tab.active {
      background: var(--primary);
      color: #000;
      border-color: var(--primary);
    }

    /* Quiz question card with better readability */
    .quiz-question-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px 22px;
      margin-bottom: 20px;
    }

    @media (min-width: 769px) {
      #root {
        display: flex;
      }

      .desktop-sidebar {
        display: flex;
        transition: width 0.25s ease, min-width 0.25s ease, padding 0.25s ease;
      }

      .desktop-layout .bottom-nav {
        display: none;
      }

      .desktop-layout .screen-content {
        padding: 28px 40px 40px;
      }

      .desktop-layout .flashcard {
        min-height: 360px;
      }

      .desktop-layout .stats-grid {
        grid-template-columns: 1fr 1fr 1fr;
      }

      .desktop-layout .quiz-question {
        font-size: 20px;
      }

      .sidebar-toggle-btn {
        display: flex;
      }
    }

    /* Splash Screen */
    .splash-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      background: linear-gradient(135deg, #0A1628 0%, #0D2137 50%, #0F2D4A 100%);
    }

    .splash-logo {
      font-size: 80px;
      animation: pulse-splash 1s ease-in-out infinite;
      margin-bottom: 20px;
    }

    @keyframes pulse-splash {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .splash-text {
      font-size: 32px;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      color: var(--primary);
      text-align: center;
      animation: fade-in 0.8s ease-out;
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Auth Screen */
    .auth-screen {
      display: flex;
      flex-direction: column;
      padding-top: 40px;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .auth-logo {
      font-size: 60px;
      margin-bottom: 16px;
    }

    .auth-title {
      font-size: 24px;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .auth-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .auth-step {
      display: none;
    }

    .auth-step.active {
      display: block;
      animation: slide-in 0.3s ease-out;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 16px;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(0, 180, 216, 0.1);
    }

    .form-input::placeholder {
      color: var(--text-secondary);
    }

    .code-input-group {
      display: flex;
      gap: 8px;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .code-input-group input {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 2px;
    }

    .fingerprint-display {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      font-size: 11px;
      color: var(--text-secondary);
      font-family: 'Courier New', monospace;
      word-break: break-all;
      max-height: 100px;
      overflow-y: auto;
    }

    .btn {
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 48px;
    }

    .btn-primary {
      background: var(--primary);
      color: #000;
      width: 100%;
    }

    .btn-primary:active {
      transform: scale(0.98);
      background: #0099B8;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      color: var(--text-primary);
      width: 100%;
    }

    .btn-secondary:active {
      background: rgba(255, 255, 255, 0.08);
    }

    .btn-small {
      padding: 8px 12px;
      font-size: 14px;
      min-height: auto;
    }

    .btn-success {
      background: var(--success);
      color: #000;
    }

    .btn-warning {
      background: var(--warning);
      color: #000;
    }

    .btn-error {
      background: var(--error);
      color: #fff;
    }

    .error-message {
      color: var(--error);
      font-size: 13px;
      margin-top: 8px;
    }

    .success-message {
      color: var(--success);
      font-size: 13px;
      margin-top: 8px;
    }

    /* Dashboard */
    .dashboard-header {
      margin-bottom: 32px;
      padding-top: 8px;
    }

    .dashboard-welcome {
      font-size: 24px;
      font-family: 'Outfit', sans-serif;
      margin-bottom: 4px;
    }

    .dashboard-date {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .daily-suggestion {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(0, 180, 216, 0.15));
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 32px;
    }

    .suggestion-label {
      font-size: 11px;
      color: var(--purple);
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .suggestion-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    .suggestion-progress {
      background: var(--bg-card);
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .suggestion-progress-bar {
      height: 100%;
      background: var(--primary);
      transition: width 0.3s ease;
    }

    .suggestion-meta {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 16px;
      margin-top: 24px;
    }

    .subjects-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .subject-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .subject-card:active {
      background: rgba(0, 180, 216, 0.1);
      border-color: var(--primary);
    }

    .subject-icon {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      background: rgba(0, 180, 216, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .subject-info {
      flex: 1;
    }

    .subject-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .subject-meta {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .subject-arrow {
      color: var(--text-secondary);
    }

    /* Flashcards Screen */
    .flashcards-header {
      margin-bottom: 24px;
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 24px;
      padding-bottom: 8px;
      -webkit-overflow-scrolling: touch;
    }

    .filter-bar::-webkit-scrollbar {
      display: none;
    }

    .filter-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid var(--border-card);
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s ease;
    }

    .filter-btn.active {
      background: var(--primary);
      color: #000;
      border-color: var(--primary);
    }

    .flashcard-container {
      margin-bottom: 24px;
    }

    .flashcard {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 16px;
      min-height: 320px;
      height: 320px;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      perspective: 1000px;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .flashcard::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(0, 180, 216, 0.1), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .flashcard:active::before {
      opacity: 1;
    }

    .flashcard-inner {
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
      position: relative;
    }

    .flashcard-inner.flipped {
      transform: rotateY(180deg);
    }

    .flashcard-front, .flashcard-back {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      backface-visibility: hidden;
      text-align: center;
      padding: 24px;
      overflow-y: auto;
    }

    .flashcard-back {
      transform: rotateY(180deg);
    }

    .flashcard-label {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .flashcard-text {
      font-size: 18px;
      line-height: 1.5;
      color: var(--text-primary);
      word-wrap: break-word;
    }

    .flashcard-progress {
      width: 100%;
      padding: 0 16px;
      margin-bottom: 20px;
    }

    .progress-dots {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .progress-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
    }

    .progress-dot.current {
      background: var(--primary);
      width: 8px;
      height: 8px;
    }

    .progress-dot.completed {
      background: var(--success);
    }

    .flashcard-actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      width: 100%;
      margin-top: 24px;
    }

    .rate-btn {
      padding: 10px;
      border: 1px solid var(--border-card);
      border-radius: 8px;
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .rate-btn.error {
      border-color: var(--error);
      color: var(--error);
    }

    .rate-btn.error:active {
      background: rgba(239, 68, 68, 0.1);
    }

    .rate-btn.warning {
      border-color: var(--warning);
      color: var(--warning);
    }

    .rate-btn.warning:active {
      background: rgba(245, 158, 11, 0.1);
    }

    .rate-btn.success {
      border-color: var(--success);
      color: var(--success);
    }

    .rate-btn.success:active {
      background: rgba(16, 185, 129, 0.1);
    }

    .session-complete {
      text-align: center;
      padding: 40px 0;
    }

    .session-icon {
      font-size: 80px;
      margin-bottom: 24px;
      animation: bounce 0.6s ease;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .session-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .session-stats {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .session-stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-card);
    }

    .session-stat:last-child {
      border-bottom: none;
    }

    .session-stat-label {
      color: var(--text-secondary);
      font-size: 13px;
    }

    .session-stat-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
    }

    /* Quiz Screen */
    .quiz-header {
      margin-bottom: 24px;
    }

    .quiz-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .quiz-item {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;

      const userAgent = navigator.userAgent;
      const screen_res = `${screen.width}x${screen.height}`;
      const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;

      let canvas_hash = '';
      try {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        ctx.fillText('MedUni9', 10, 10);
        canvas_hash = canvas.toDataURL().substring(0, 50);
      } catch (e) {}

      return `${userAgent.substring(0, 30)}_${screen_res}_${timezone}_${canvas_hash}`.substring(0, 128);
    };

    // SM-2 Algorithm
    const SM2 = {
      calculateNextReview: (quality, reps, ef, interval) => {
        let newReps = reps + 1;
        let newEf = ef + 0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02);
        if (newEf < 1.3) newEf = 1.3;

        let newInterval;
        if (newReps === 1) newInterval = 1;
        else if (newReps === 2) newInterval = 3;
        else newInterval = Math.round(interval * newEf);

        const nextReview = Date.now() + (newInterval * 24 * 60 * 60 * 1000);
        return { newReps, newEf, newInterval, nextReview };
      },

      getDueCards: (cards, srData) => {
        const now = Date.now();
        return cards.filter(card => {
          const data = srData[card.id] || { nextReview: 0 };
          return data.nextReview <= now;
        }).sort((a, b) => {
          const aData = srData[a.id] || { nextReview: 0 };
          const bData = srData[b.id] || { nextReview: 0 };
          return aData.nextReview - bData.nextReview;
        });
      }
    };

    // Format time

      const seconds = Math.floor(ms / 1000);
      const minutes = Math.floor(seconds / 60);
      const hours = Math.floor(minutes / 60);

      if (hours > 0) return `${hours}h ${minutes % 60}m`;
